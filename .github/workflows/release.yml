name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    # Safety: only fire on tags that match the crate's version in
    # Cargo.toml. A stray tag push won't trigger a publish because the
    # `verify-version` step compares the tag to `Cargo.toml`.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: verify tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION="$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "tag v$TAG_VERSION does not match Cargo.toml version $CARGO_VERSION" >&2
            exit 1
          fi

      - name: cargo publish dry-run
        run: cargo publish --dry-run --all-features --locked

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish --all-features --locked
